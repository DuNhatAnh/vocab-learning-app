version: '3.8'

services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vocab-backend
    ports:
      - "8080:8080"
    restart: on-failure
    networks:
      - vocab-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vocab-frontend
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_started
    restart: on-failure
    networks:
      - vocab-network

networks:
  vocab-network:
    driver: bridge

