version: '3.8'

services:
  db:
    image: postgres:15
    container_name: vocab-db
    environment:
      POSTGRES_DB: vocabdb
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d vocabdb"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - vocab-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vocab-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/vocabdb
      SPRING_DATASOURCE_USERNAME: user
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure
    networks:
      - vocab-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vocab-frontend
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_started
    restart: on-failure
    networks:
      - vocab-network

networks:
  vocab-network:
    driver: bridge

volumes:
  postgres_data:
